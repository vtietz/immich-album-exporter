services:
  immich-album-exporter:
    image: ${IMMICH_ALBUM_EXPORTER_IMAGE:-ghcr.io/vtietz/immich-album-exporter:latest}
    container_name: immich-album-exporter
    user: "${PUID:-1000}:${PGID:-1000}"
    restart: unless-stopped
    environment:
      TZ: ${TZ:-UTC}
      IMMICH_BASE_URL: ${IMMICH_BASE_URL:-}
      IMMICH_API_KEY: ${IMMICH_API_KEY:-}
      IMMICH_ACCESS_TOKEN: ${IMMICH_ACCESS_TOKEN:-}
      IMMICH_SELECTION_USER_ID: ${IMMICH_SELECTION_USER_ID:-}
      IMMICH_SELECTION_START_DATE: ${IMMICH_SELECTION_START_DATE:-}
    command: ["worker", "--config", "/config/config.yml"]
    volumes:
      - ${IMMICH_EXPORTER_CONFIG_DIR:-./config}:/config:ro
      - ${IMMICH_EXPORTER_DATA_DIR:-./data}:/data
      - ${IMMICH_EXPORTER_TARGET_DIR:-./target}:/target
